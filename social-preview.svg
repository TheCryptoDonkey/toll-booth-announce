  <!-- Illustration — bridge concept: toll booth → Nostr relay -->
  <g transform="translate(160, 170)">
    <!-- Simplified toll booth kiosk -->
    <rect x="60" y="100" width="60" height="120" rx="4" fill="url(#steel)"/>
    <rect x="64" y="104" width="52" height="112" rx="3" fill="#1e293b"/>
    <!-- Booth window -->
    <rect x="70" y="115" width="40" height="30" rx="2" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
    <!-- Screen glow -->
    <rect x="74" y="119" width="32" height="5" rx="1" fill="#22d3ee" opacity="0.4"/>
    <rect x="74" y="127" width="24" height="4" rx="1" fill="#22d3ee" opacity="0.25"/>
    <rect x="74" y="134" width="28" height="4" rx="1" fill="#22d3ee" opacity="0.15"/>
    <!-- Booth roof -->
    <polygon points="54,100 126,100 122,90 58,90" fill="url(#steelLight)"/>
    <rect x="54" y="87" width="72" height="5" rx="1" fill="#64748b"/>
    <!-- Ground -->
    <rect x="20" y="220" width="340" height="6" rx="2" fill="#1e293b"/>
    <line x1="80" y1="223" x2="100" y2="223" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,5"/>
    <line x1="115" y1="223" x2="135" y2="223" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,5"/>
    <line x1="150" y1="223" x2="170" y2="223" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,5"/>

    <!-- Barrier post -->
    <rect x="115" y="110" width="10" height="110" rx="2" fill="url(#steelLight)"/>
    <rect x="113" y="108" width="14" height="7" rx="2" fill="#64748b"/>
    <circle cx="120" cy="118" r="5" fill="#475569" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="120" cy="118" r="2" fill="#334155"/>

    <!-- Barrier arm (raised) -->
    <g transform="rotate(-30, 120, 118)">
      <rect x="120" y="115" width="130" height="7" rx="3" fill="url(#amber)"/>
      <rect x="140" y="115" width="10" height="7" fill="#0f172a" opacity="0.3"/>
      <rect x="160" y="115" width="10" height="7" fill="#0f172a" opacity="0.3"/>
      <rect x="180" y="115" width="10" height="7" fill="#0f172a" opacity="0.3"/>
      <rect x="200" y="115" width="10" height="7" fill="#0f172a" opacity="0.3"/>
      <rect x="220" y="115" width="10" height="7" fill="#0f172a" opacity="0.3"/>
      <circle cx="252" cy="118.5" r="4" fill="#fbbf24"/>
    </g>

    <!-- Lightning bolt (passing through gate) -->
    <g filter="url(#glow)" transform="translate(170, 135)">
      <polygon points="16,0 0,34 13,34 -3,68 40,26 24,26 42,0" fill="url(#amberLight)"/>
    </g>

    <!-- Flow arrow: config → Nostr -->
    <g opacity="0.5">
      <line x1="270" y1="160" x2="330" y2="160" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4"/>
      <polygon points="330,155 342,160 330,165" fill="#94a3b8"/>
    </g>

    <!-- Nostr relay node -->
    <g filter="url(#glow)">
      <circle cx="375" cy="160" r="24" fill="none" stroke="url(#nostr)" stroke-width="2.5"/>
      <circle cx="375" cy="160" r="5" fill="url(#nostr)"/>
    </g>

    <!-- Broadcast lines from relay -->
    <g opacity="0.35" stroke="url(#nostr)" stroke-width="1.5" stroke-linecap="round">
      <line x1="399" y1="148" x2="425" y2="132"/>
      <line x1="399" y1="160" x2="430" y2="160"/>
      <line x1="399" y1="172" x2="425" y2="188"/>
    </g>

    <!-- Discovery nodes (AI agents finding the service) -->
    <circle cx="440" cy="125" r="7" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
    <circle cx="445" cy="160" r="7" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
    <circle cx="440" cy="195" r="7" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
    <!-- Tiny agent dots inside -->
    <circle cx="440" cy="125" r="2" fill="#a78bfa" opacity="0.4"/>
    <circle cx="445" cy="160" r="2" fill="#a78bfa" opacity="0.3"/>
    <circle cx="440" cy="195" r="2" fill="#a78bfa" opacity="0.4"/>
  </g>

  <!-- Divider -->
  <g transform="translate(580, 220)">
    <line x1="0" y1="0" x2="0" y2="200" stroke="#334155" stroke-width="1" opacity="0.5"/>
    <line x1="6" y1="0" x2="6" y2="200" stroke="#334155" stroke-width="1" opacity="0.5"/>
    <!-- Bridge icon (arrow through a gate) -->
    <g transform="translate(-10, 84)">
      <rect x="0" y="0" width="26" height="18" rx="3" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <text x="13" y="13" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#a78bfa">N</text>
    </g>
  </g>

  <!-- Title: toll-booth-announce (two lines for readability) -->
  <text font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Menlo', monospace" font-weight="bold" fill="#f8fafc" letter-spacing="-1">
    <tspan x="660" y="310" font-size="54">toll-booth-</tspan>
    <tspan x="660" y="365" font-size="54">announce</tspan>
  </text>

  <!-- Tagline -->
  <text x="662" y="405" font-family="'Inter', -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#94a3b8">your toll-booth. on Nostr. for agents.</text>

  <!-- Keyword ticker along bottom -->
  <g opacity="0.06" fill="#94a3b8">
    <text y="622" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="12" letter-spacing="1">
      <tspan x="40">lightning</tspan>
      <tspan x="140">nostr</tspan>
      <tspan x="210">l402</tspan>
      <tspan x="265">kind-31402</tspan>
      <tspan x="375">discovery</tspan>
      <tspan x="470">cashu</tspan>
      <tspan x="535">bitcoin</tspan>
      <tspan x="620">decentralised</tspan>
      <tspan x="760">bridge</tspan>
      <tspan x="835">macaroon</tspan>
      <tspan x="935">paid-api</tspan>
      <tspan x="1030">sats</tspan>
      <tspan x="1085">relay</tspan>
      <tspan x="1150">typescript</tspan>
    </text>
  </g>
</svg>
