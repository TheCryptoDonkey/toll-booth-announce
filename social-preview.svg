<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Lightning gradient -->
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <!-- Nostr purple -->
    <linearGradient id="nostr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Gate gradient -->
    <linearGradient id="gate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#0f172a"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#94a3b8" stroke-width="0.5" fill="none">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Centred graphic group (gate ~390-650, relay ~800, nodes ~880) -->
  <!-- Toll booth gate — left pillar -->
  <rect x="390" y="150" width="24" height="280" rx="4" fill="url(#gate)"/>
  <rect x="390" y="140" width="24" height="20" rx="3" fill="#64748b"/>

  <!-- Toll booth gate — right pillar -->
  <rect x="646" y="150" width="24" height="280" rx="4" fill="url(#gate)"/>
  <rect x="646" y="140" width="24" height="20" rx="3" fill="#64748b"/>

  <!-- Gate barrier (raised) -->
  <rect x="414" y="170" width="232" height="8" rx="4" fill="#64748b" opacity="0.6"/>
  <rect x="414" y="170" width="232" height="8" rx="4" fill="url(#bolt)" opacity="0.3"/>

  <!-- Lightning bolt through the gate -->
  <g filter="url(#glow)">
    <polygon points="530,180 510,265 535,265 500,355 550,265 525,265 545,180" fill="url(#bolt)"/>
  </g>

  <!-- Ambient glow behind the bolt -->
  <circle cx="525" cy="270" r="60" fill="#f59e0b" opacity="0.06" filter="url(#softGlow)"/>

  <!-- Dashed connection line to relay -->
  <g opacity="0.4">
    <line x1="670" y1="270" x2="760" y2="270" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
  </g>

  <!-- Nostr relay node -->
  <g filter="url(#glow)">
    <circle cx="810" cy="270" r="28" fill="none" stroke="url(#nostr)" stroke-width="3"/>
    <circle cx="810" cy="270" r="6" fill="url(#nostr)"/>
  </g>

  <!-- Broadcast lines from relay -->
  <g opacity="0.25" stroke="url(#nostr)" stroke-width="1.5">
    <line x1="838" y1="255" x2="870" y2="235"/>
    <line x1="838" y1="270" x2="875" y2="270"/>
    <line x1="838" y1="285" x2="870" y2="305"/>
  </g>

  <!-- Small discovery nodes -->
  <circle cx="888" cy="228" r="8" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  <circle cx="893" cy="270" r="8" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.3"/>
  <circle cx="888" cy="312" r="8" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>

  <!-- Project name -->
  <text x="640" y="490" text-anchor="middle" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', Menlo, monospace" font-size="42" font-weight="700" fill="#f8fafc" letter-spacing="-0.5">toll-booth-announce</text>

  <!-- Tagline -->
  <text x="640" y="530" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#94a3b8">L402 middleware → Nostr service discovery</text>
</svg>
